name: deploy pages

# 把 site/ 內容放 artifact 根，data/ 與 report/ 原樣放根 → index.html 在根、./data/ ./report/ 路徑正確
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
      - 'report/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble artifact
        run: |
          mkdir -p _site
          cp -r site/. _site/
          cp -r data _site/data
          cp -r report _site/report
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
