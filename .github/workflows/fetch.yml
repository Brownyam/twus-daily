name: fetch market snapshot

# 數據快報層：5 個 slot 定時抓，寫進 data/ 並 commit（用內建 GITHUB_TOKEN，可靠路徑）
on:
  schedule:
    - cron: '7 0 * * 1-5'     # tw-pre   08:07 TST（避開 :00 整點壅塞，降低 GitHub skip）
    - cron: '3 3 * * 1-5'     # tw-mid   11:03 TST
    - cron: '47 5 * * 1-5'    # tw-close 13:47 TST
    - cron: '3 13 * * 1-5'    # us-pre   21:03 TST
    - cron: '33 15 * * 1-5'   # us-mid   23:33 TST
  workflow_dispatch:
    inputs:
      slot:
        description: 'slot (tw-pre|tw-mid|tw-close|us-pre|us-mid)'
        required: true
        default: 'tw-close'

permissions:
  contents: write
  actions: write   # 讓資料 commit 後能 dispatch pages.yml（GITHUB_TOKEN 的 push 不會自動觸發其他 workflow）

concurrency:
  group: fetch-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 用「實際觸發的 cron 表達式」精準對 slot（不靠猜時間，免 GHA lag 對不到窗口）
          case "${{ github.event.schedule }}" in
            "0 0 * * 1-5")   slot="tw-pre" ;;
            "0 3 * * 1-5")   slot="tw-mid" ;;
            "45 5 * * 1-5")  slot="tw-close" ;;
            "0 13 * * 1-5")  slot="us-pre" ;;
            "30 15 * * 1-5") slot="us-mid" ;;
            *) slot=""; echo "未知 schedule: ${{ github.event.schedule }}" ;;
          esac
          echo "slot=$slot" >> "$GITHUB_OUTPUT"

      - name: Run snapshot
        if: steps.slot.outputs.slot != ''
        run: python fetch/snapshot.py --slot "${{ steps.slot.outputs.slot }}"

      - name: Commit & push data
        id: commit
        if: steps.slot.outputs.slot != ''
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "data/ 無變動。"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: ${{ steps.slot.outputs.slot }} snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN 的 push 不會自動觸發 pages.yml，故顯式 dispatch
      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --repo "${{ github.repository }}"
