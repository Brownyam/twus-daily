name: fetch market snapshot

# 數據快報層：由可靠的 claude.ai routine 寫 .trigger/slot.txt 觸發（push），抓資料寫進 data/。
# 不用 GitHub cron（cron 會 skip/遲到，且觸發時序不可控）。手動可用 workflow_dispatch。
on:
  push:
    paths:
      - '.trigger/**'
  workflow_dispatch:
    inputs:
      slot:
        description: 'slot (tw-pre|tw-mid|tw-close|us-pre|us-mid)'
        required: true
        default: 'tw-close'

permissions:
  contents: write
  actions: write   # 讓資料 commit 後能 dispatch pages.yml（GITHUB_TOKEN 的 push 不會自動觸發其他 workflow）

concurrency:
  group: fetch-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # push 觸發：從 .trigger/slot.txt 第一欄讀 slot（由 routine 寫入）
          slot=""
          if [ -f .trigger/slot.txt ]; then
            slot=$(head -1 .trigger/slot.txt | awk '{print $1}')
          fi
          case "$slot" in
            tw-pre|tw-mid|tw-close|us-pre|us-mid) ;;
            *) echo "無效或缺少 slot（.trigger/slot.txt='$slot'）"; slot="" ;;
          esac
          echo "slot=$slot" >> "$GITHUB_OUTPUT"

      - name: Run snapshot
        if: steps.slot.outputs.slot != ''
        run: python fetch/snapshot.py --slot "${{ steps.slot.outputs.slot }}"

      - name: Commit & push data
        id: commit
        if: steps.slot.outputs.slot != ''
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "data/ 無變動。"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: ${{ steps.slot.outputs.slot }} snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN 的 push 不會自動觸發 pages.yml，故顯式 dispatch
      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --repo "${{ github.repository }}"
